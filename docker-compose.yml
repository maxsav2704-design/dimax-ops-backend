services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dimax
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dimax"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$MINIO_BUCKET || true &&
      mc anonymous set download local/$$MINIO_BUCKET || true &&
      echo 'MinIO bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-dimax}

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: backend-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - ./:/app
    command: >
      sh -c "echo '⏳ Running migrations...' &&
             alembic upgrade head &&
             echo '✅ Migrations done. Starting API...' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  sync-health:
    image: backend-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.scripts.run_sync_health_job
    restart: unless-stopped

  outbox-worker:
    image: backend-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    command: python -m app.workers.outbox_worker
    restart: unless-stopped

  maintenance-worker:
    image: backend-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.workers.maintenance_worker
    restart: unless-stopped

  sync-gc-worker:
    image: backend-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.workers.sync_gc_worker
    restart: unless-stopped

volumes:
  pgdata:
  minio_data:
